<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ddc84;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3ddc84;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- Grid lines (tactical) -->
  <g opacity="0.06" stroke="#3ddc84" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
  </g>

  <!-- Shield / Crest -->
  <g transform="translate(400, 180)">
    <path d="M-60,-100 L60,-100 L60,0 Q60,80 0,120 Q-60,80 -60,0 Z"
          fill="url(#shieldGrad)" stroke="#3ddc84" stroke-width="2.5" opacity="0.95"/>

    <!-- Shield inner border -->
    <path d="M-52,-90 L52,-90 L52,0 Q52,70 0,108 Q-52,70 -52,0 Z"
          fill="none" stroke="#3ddc84" stroke-width="1" opacity="0.3"/>

    <!-- Eye / All-seeing symbol -->
    <g transform="translate(0, -25)">
      <!-- Eye outline -->
      <path d="M-25,0 Q0,-22 25,0 Q0,22 -25,0 Z"
            fill="none" stroke="#3ddc84" stroke-width="2.5"/>
      <!-- Pupil -->
      <circle cx="0" cy="0" r="4" fill="#3ddc84"/>
      <!-- Iris glow -->
      <circle cx="0" cy="0" r="8" fill="none" stroke="#3ddc84" stroke-width="0.5" opacity="0.5"/>
    </g>

    <!-- Signal arcs (from eye) -->
    <g transform="translate(0, -25)" opacity="0.4">
      <path d="M-30,8 Q-40,-15 -25,-25" fill="none" stroke="#3ddc84" stroke-width="1.5"/>
      <path d="M30,8 Q40,-15 25,-25" fill="none" stroke="#3ddc84" stroke-width="1.5"/>
      <path d="M-35,12 Q-50,-20 -25,-28" fill="none" stroke="#3ddc84" stroke-width="0.8" opacity="0.5"/>
      <path d="M35,12 Q50,-20 25,-28" fill="none" stroke="#3ddc84" stroke-width="0.8" opacity="0.5"/>
    </g>

    <!-- Crosshairs -->
    <g transform="translate(0, 25)" opacity="0.6">
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#e94560" stroke-width="0.8"/>
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#e94560" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="3" fill="none" stroke="#e94560" stroke-width="0.8"/>
    </g>

    <!-- Bottom arc text path -->
    <path id="bottomArc" d="M-40,70 Q0,95 40,70" fill="none"/>
  </g>

  <!-- Title text -->
  <text x="400" y="330" text-anchor="middle" fill="#3ddc84"
        font-family="'Courier New', monospace" font-size="28" font-weight="bold" letter-spacing="6">
    SESIS-FEDERATION
  </text>

  <!-- Subtitle -->
  <text x="400" y="355" text-anchor="middle" fill="#6b7280"
        font-family="'Courier New', monospace" font-size="12" letter-spacing="4">
    C4ISR PLATFORM — CLASSIFIED
  </text>

  <!-- Classification markings -->
  <rect x="20" y="370" width="120" height="18" rx="2" fill="none" stroke="#e94560" stroke-width="0.8" opacity="0.6"/>
  <text x="80" y="383" text-anchor="middle" fill="#e94560"
        font-family="'Courier New', monospace" font-size="8" letter-spacing="2" opacity="0.6">
    RESTRICTED / FOUO
  </text>

  <rect x="660" y="370" width="120" height="18" rx="2" fill="none" stroke="#3ddc84" stroke-width="0.8" opacity="0.4"/>
  <text x="720" y="383" text-anchor="middle" fill="#3ddc84"
        font-family="'Courier New', monospace" font-size="8" letter-spacing="2" opacity="0.4">
    VER 1.0.0
  </text>

  <!-- Corner ornaments -->
  <g opacity="0.3" stroke="#3ddc84" stroke-width="1">
    <line x1="10" y1="10" x2="30" y2="10"/>
    <line x1="10" y1="10" x2="10" y2="30"/>
    <line x1="790" y1="10" x2="770" y2="10"/>
    <line x1="790" y1="10" x2="790" y2="30"/>
    <line x1="10" y1="390" x2="30" y2="390"/>
    <line x1="10" y1="390" x2="10" y2="370"/>
    <line x1="790" y1="390" x2="770" y2="390"/>
    <line x1="790" y1="390" x2="790" y2="370"/>
  </g>
</svg>